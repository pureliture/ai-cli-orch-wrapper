description = "Move a GitHub issue to Project In Progress and create a local git worktree"
prompt = '''
Transition a GitHub issue to `In Progress` on the active GitHub Project and create a local worktree. Project `Status` is the workflow state; do not add workflow labels.

## Steps

1. Parse the issue number from the argument, such as `/gh-start 25` to `N=25`. If missing, ask for the issue number. Validate that `N` is a positive integer before continuing.

2. Resolve Project configuration using the env-first, repository-fallback contract from `docs/reference/project-board.md`:
   ```bash
   PM_PROJECT_NUMBER="${PM_PROJECT_NUMBER:-3}"
   PM_PROJECT_ID="${PM_PROJECT_ID:-PVT_kwHOA6302M4BT5fA}"
   PM_STATUS_FIELD_ID="${PM_STATUS_FIELD_ID:-PVTSSF_lAHOA6302M4BT5fAzhBFN48}"
   PM_IN_PROGRESS_OPTION_ID="${PM_IN_PROGRESS_OPTION_ID:-68368c4f}"
   ```

3. Fetch issue context:
   ```bash
   ISSUE_JSON=$(gh issue view <N> --repo pureliture/ai-cli-orch-wrapper --json title,url,labels)
   TITLE=$(printf '%s' "$ISSUE_JSON" | jq -r '.title')
   ISSUE_URL=$(printf '%s' "$ISSUE_JSON" | jq -r '.url')
   ```

4. Ensure the issue has a Project item, then find the item ID. Retry lookup up to 5 times because Projects indexing can lag:
   ```bash
   ITEM_ID=""
   for attempt in 1 2 3 4 5; do
     ITEM_ID=$(gh project item-list "$PM_PROJECT_NUMBER" --owner pureliture --format json --limit 500 \
       --jq ".items[] | select(.content.number == <N> and .content.type == \"Issue\") | .id")
     [ -n "$ITEM_ID" ] && break
     [ "$attempt" = 1 ] && gh project item-add "$PM_PROJECT_NUMBER" --owner pureliture --url "$ISSUE_URL" >/dev/null || true
     sleep 2
   done
   ```
   If no item ID is found, report `⚠ Issue Project item lookup failed — add or update manually` and stop before creating a branch.

5. Set the issue Project item to `Status=In Progress`:
   ```bash
   gh project item-edit \
     --project-id "$PM_PROJECT_ID" \
     --id "$ITEM_ID" \
     --field-id "$PM_STATUS_FIELD_ID" \
     --single-select-option-id "$PM_IN_PROGRESS_OPTION_ID"
   ```
   Treat this as the workflow state update. Do not add any status label.

6. Derive the branch slug from the issue title:
   - Strip the canonical title prefix before slugging when present.
   - Convert non-ASCII characters to ASCII when possible.
   - Lowercase the result.
   - Replace non-alphanumeric characters except hyphens with `-`.
   - Collapse consecutive hyphens into one.
   - Truncate to 40 characters first, then strip leading/trailing hyphens.

7. Determine the branch prefix from the issue's `type:*` label:
   - `type:bug` maps to `fix`.
   - `type:chore` maps to `chore`.
   - `type:task` maps to `feat`.
   - `type:epic` maps to `feat`.
   - Fallback is `feat`.

8. Create a local git worktree from the latest `origin/main`:
   ```bash
   BRANCH_NAME="<prefix>/<N>-<slug>"
   WORKTREE_PATH=".aco-worktrees/<prefix>-<N>"

   git fetch origin main
   git worktree add -b "$BRANCH_NAME" "$WORKTREE_PATH" origin/main
   ```

9. Report the worktree path, branch name, issue URL, and confirm the Project item is now `In Progress`.
'''
