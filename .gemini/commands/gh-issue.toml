description = "Create a canonical GitHub issue with durable labels and Project Backlog/Priority fields"
prompt = '''
Create a GitHub issue in `pureliture/ai-cli-orch-wrapper` using the `github-kanban-ops` canonical model. Labels are durable classification only; workflow state and priority live on the GitHub Project.

## Steps

1. Gather inputs if they were not provided:
   - **Issue type**: One of `epic`, `task`, `bug`, or `chore` only.
   - **Summary/title**: Concise title text without the type prefix.
   - **Body context**: Outcome, scope, acceptance criteria or definition of done, constraints, references, and bug-specific behavior details when applicable.
   - **Area label** (optional): Use `area:*` only when the affected area is clear.
   - **Review origin** (optional): Add `origin:review` only when the work is explicitly from PR review feedback.
   - **Parent epic** (optional): Parent issue number, such as `22`.
   - **Priority**: Assess `P0`, `P1`, or `P2` from the context for the Project `Priority` field. If context is insufficient, ask one brief question; if the issue must be created without asking, leave Priority unset and report a triage warning.

2. Enforce the canonical issue title and label contract:
   - Title format is exactly `<type>: <summary>`, where `<type>` is `epic`, `task`, `bug`, or `chore`.
   - Required label is exactly `type:<type>`.
   - Optional labels are limited to `area:*` and conditional `origin:review`.
   - Do not add labels for workflow state, planning buckets, priority, or size.

3. Generate a substantive issue body with the canonical generator:
   ```bash
   python3 .claude/skills/github-kanban-ops/scripts/make_issue_body.py \
     --type "<type>" \
     --title "<summary>" \
     --summary "<specific summary>" \
     --outcome "<specific outcome or operational goal>" \
     --scope "<specific scope, constraints, or included/excluded work>" \
     --acceptance "[ ] <observable completion condition>" \
     --notes "<useful notes, references, or non-goals>" \
     --parent "#<parent-N>" \
     --format body
   ```
   For bugs, also pass `--actual`, `--expected`, `--impact`, and one or more `--reproduction` arguments. For epics, pass one or more `--children` arguments when child deliverables are known.

4. Create the issue with durable labels only:
   ```bash
   BODY_FILE=$(mktemp)
   trap 'rm -f "$BODY_FILE"' EXIT
   cat > "$BODY_FILE" <<'_GH_ISSUE_BODY_'
   <generated body>
   _GH_ISSUE_BODY_

   LABELS="type:<type>"
   [ -n "<area-label>" ] && LABELS="$LABELS,<area-label>"
   [ "<origin-review>" = "true" ] && LABELS="$LABELS,origin:review"

   ISSUE_URL=$(gh issue create \
     --repo pureliture/ai-cli-orch-wrapper \
     --title "<type>: <summary>" \
     --label "$LABELS" \
     --body-file "$BODY_FILE")
   ```

5. Resolve Project configuration using the env-first, repository-fallback contract from `docs/reference/project-board.md`:
   ```bash
   PM_PROJECT_NUMBER="${PM_PROJECT_NUMBER:-3}"
   PM_PROJECT_ID="${PM_PROJECT_ID:-PVT_kwHOA6302M4BT5fA}"
   PM_STATUS_FIELD_ID="${PM_STATUS_FIELD_ID:-PVTSSF_lAHOA6302M4BT5fAzhBFN48}"
   PM_BACKLOG_OPTION_ID="${PM_BACKLOG_OPTION_ID:-a490720c}"
   PM_PRIORITY_FIELD_ID="${PM_PRIORITY_FIELD_ID:-PVTSSF_lAHOA6302M4BT5fAzhBFN_U}"
   PM_P0_OPTION_ID="${PM_P0_OPTION_ID:-65dd5d04}"
   PM_P1_OPTION_ID="${PM_P1_OPTION_ID:-ed47fdcf}"
   PM_P2_OPTION_ID="${PM_P2_OPTION_ID:-6eb1a525}"
   ```

6. Add the issue to the Project and set `Status=Backlog`. Warn and continue if Project item add or update fails:
   ```bash
   ITEM_ID=$(gh project item-add "$PM_PROJECT_NUMBER" --owner pureliture --url "$ISSUE_URL" --format json --jq '.id' 2>/dev/null || true)

   if [ -n "$ITEM_ID" ]; then
     gh project item-edit --project-id "$PM_PROJECT_ID" --id "$ITEM_ID" \
       --field-id "$PM_STATUS_FIELD_ID" \
       --single-select-option-id "$PM_BACKLOG_OPTION_ID" \
       || echo "âš  Project status update failed â€” update manually"
   else
     echo "âš  Project item add failed â€” update manually"
   fi
   ```

7. If Priority was assessed, set the Project `Priority` field only. If Priority is unset, print `âš  Priority unset â€” triage needed`:
   ```bash
   case "<priority>" in
     P0) PRIORITY_OPTION_ID="$PM_P0_OPTION_ID" ;;
     P1) PRIORITY_OPTION_ID="$PM_P1_OPTION_ID" ;;
     P2) PRIORITY_OPTION_ID="$PM_P2_OPTION_ID" ;;
     *) PRIORITY_OPTION_ID="" ;;
   esac

   if [ -z "${ITEM_ID:-}" ]; then
     echo "âš  Priority update skipped â€” Project item missing"
   elif [ -n "$PRIORITY_OPTION_ID" ]; then
     gh project item-edit --project-id "$PM_PROJECT_ID" --id "$ITEM_ID" \
       --field-id "$PM_PRIORITY_FIELD_ID" \
       --single-select-option-id "$PRIORITY_OPTION_ID" \
       || echo "âš  Priority update failed â€” update manually"
   else
     echo "âš  Priority unset â€” triage needed"
   fi
   ```

8. If a parent epic was provided, link the child issue best-effort with native sub-issues first and body/checklist fallback when practical.

9. Report the created issue URL, issue number, Project status update result, Priority result, and any parent linkage warnings.
'''
