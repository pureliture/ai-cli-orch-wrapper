description = "Review followup issue creation and Project #3 backlog addition"
prompt = """
Review followup issue creation and Project #3 backlog addition

This command creates a post-review followup issue and adds it to Project #3.

## Instructions

1. Ask the user for the following details:
   - PR Number: The Pull Request that originated this followup.
   - Description: A clear description of the followup work.
   - Type: Choose between 'task', 'chore', or 'bug'.

2. Map the type to the correct label:
   - if type is 'bug', use label `type:bug`
   - if type is 'task', use label `type:task`
   - if type is 'chore', use label `type:chore`

3. Infer the `area:*` label from the description or files mentioned:
   - if it mentions `packages/wrapper` or `cli.ts` → `area:wrapper`
   - if it mentions `packages/installer` → `area:installer`
   - if it mentions `templates/` → `area:templates`
   - if it mentions `ci.yml` or GitHub Actions → `area:ci`

4. Create the GitHub issue by running the `gh issue create` command with these parameters:
   - Repository: `pureliture/ai-cli-orch-wrapper`
   - Title: Use the format `<type>: <description>`
   - Labels: Apply the mapped `type:*` label, the inferred `area:*` label (if any), `origin:review`, and `sprint:v3`
   - Body: 
     Line 1: `From: #<PR_NUMBER> review comment`
     Line 2: (empty)
     Line 3: `<description>`
     Line 4: (empty)
     Line 5: `See also: #<PR_NUMBER>`

5. Once the issue is created, extract the issue URL from the command output.

6. Add the new issue to the Project #3 Backlog by running `gh project item-add 3 --owner pureliture --url <issue_url>`.

7. Confirm to the user that the issue has been created and added to the project backlog.
"""
