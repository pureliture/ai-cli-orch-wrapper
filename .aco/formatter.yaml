version: 1

providerDefaults:
  codex:
    launchArgs: []
  antigravity:
    # agy supports --sandbox (Terminal Sandbox isolation) — keep this flag.
    launchArgs:
      - --sandbox

modelAliasMap:
  sonnet-4.6:
    provider: codex
    model: gpt-5.4
  opus:
    provider: antigravity
    # TODO: agy has no --model CLI flag; model is chosen out-of-band via /model in the session.
    model: ~
  haiku:
    provider: antigravity
    # TODO: agy has no --model CLI flag; model is chosen out-of-band via /model in the session.
    model: ~

providerModels:
  codex:
    - gpt-5.4
  antigravity:
    # agy는 per-call 모델 미지원; agy `/model`로 선택된 persisted 디폴트 사용; aco `--model`은 antigravity에서 무시.
    # 아래는 참고용 모델 목록 (aco로 선택 불가, agy 세션 내부에서만 /model로 변경 가능):
    # - gemini-3.1-pro
    # - gemini-3.5-flash
    # - claude-sonnet-4.6
    # - claude-opus-4.6
    # - gpt-oss-120b

effortMap:
  codex:
    low: low
    medium: medium
    high: high
    max: xhigh
  antigravity:
    low: low
    medium: medium
    high: high
    max: high

roleHintRules:
  research:
    preferredProvider: antigravity
  execute:
    preferredProvider: codex
  review:
    preferredProvider: codex

fallback:
  provider: codex
  model: gpt-5.4
