version: 1

providerDefaults:
  codex:
    launchArgs: []
  antigravity:
    # agy supports --sandbox (Terminal Sandbox isolation) — keep this flag.
    launchArgs:
      - --sandbox

modelAliasMap:
  sonnet-4.6:
    provider: codex
    model: gpt-5.4
  opus:
    provider: antigravity
    # TODO: agy has no --model CLI flag; model is chosen out-of-band via /model in the session.
    model: ~
  haiku:
    provider: antigravity
    # TODO: agy has no --model CLI flag; model is chosen out-of-band via /model in the session.
    model: ~

providerModels:
  codex:
    - gpt-5.4
  antigravity:
    # TODO: agy has no --model CLI flag; model is chosen out-of-band via /model in the session.
    # Concrete model IDs are not passable at launch time.

effortMap:
  codex:
    low: low
    medium: medium
    high: high
    max: xhigh
  antigravity:
    low: low
    medium: medium
    high: high
    max: high

roleHintRules:
  research:
    preferredProvider: antigravity
  execute:
    preferredProvider: codex
  review:
    preferredProvider: codex

fallback:
  provider: codex
  model: gpt-5.4
