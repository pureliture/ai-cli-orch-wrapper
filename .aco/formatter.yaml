version: 1

providerDefaults:
  codex:
    launchArgs: []
  gemini_cli:
    launchArgs:
      - --sandbox

modelAliasMap:
  sonnet-4.6:
    provider: codex
    model: gpt-5.4
  opus:
    provider: gemini_cli
    model: gemini-2.5-pro
  haiku:
    provider: gemini_cli
    model: gemini-2.5-flash

providerModels:
  codex:
    - gpt-5.4
  gemini_cli:
    - gemini-2.5-pro
    - gemini-2.5-flash

effortMap:
  codex:
    low: low
    medium: medium
    high: high
    max: xhigh
  gemini_cli:
    low: low
    medium: medium
    high: high
    max: high

roleHintRules:
  research:
    preferredProvider: gemini_cli
  execute:
    preferredProvider: codex
  review:
    preferredProvider: codex

fallback:
  provider: codex
  model: gpt-5.4
