name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build wrapper first so installer can resolve @aco/wrapper types (dist/index.d.ts)
      - name: build wrapper (for types)
        run: npm run build --workspace=packages/wrapper
      - name: typecheck wrapper
        run: npm run typecheck --workspace=packages/wrapper
      - name: typecheck installer
        run: npm run typecheck --workspace=packages/installer

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/wrapper
      - run: npm test --workspace=packages/wrapper

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack workspaces
        run: |
          mkdir -p "$RUNNER_TEMP/aco-pack"
          npm pack --workspaces --pack-destination "$RUNNER_TEMP/aco-pack"
      - name: Install aco binary (local prefix, no sudo)
        run: |
          TARBALL=$(find "$RUNNER_TEMP/aco-pack" -maxdepth 1 -name 'aco-wrapper-*.tgz' -print -quit)
          test -n "$TARBALL" || { echo "ERROR: aco-wrapper tarball not found"; exit 1; }
          npm install --prefix "$RUNNER_TEMP/aco-install" "$TARBALL"
          echo "$RUNNER_TEMP/aco-install/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Smoke test aco binary
        run: |
          aco --version
          aco run --help || true
