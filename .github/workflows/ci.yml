name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check

  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/verify-contract.ts

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: build aco package
        run: npm run build --workspace=packages/wrapper
      - name: typecheck wrapper
        run: npm run typecheck --workspace=packages/wrapper

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/wrapper
      - run: npm test --workspace=packages/wrapper

  go-build:
    name: go-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./cmd/aco
      - name: Verify binary exists
        run: test -f aco || test -f aco-linux-amd64 || ls cmd/aco/

  go-test:
    name: go-test
    runs-on: ubuntu-latest
    needs: [go-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack aco package
        run: |
          mkdir -p "$RUNNER_TEMP/aco-pack"
          npm pack --workspace=packages/wrapper --pack-destination "$RUNNER_TEMP/aco-pack" --json > "$RUNNER_TEMP/aco-pack/pack.json"
      - name: Install aco binary (local prefix, no sudo)
        run: |
          TARBALL=$(node -e "const fs=require('node:fs'); const path=require('node:path'); const pack=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/aco-pack/pack.json','utf8')); const filename=Array.isArray(pack) ? pack[0]?.filename : pack?.filename; if (!filename) process.exit(1); process.stdout.write(path.join(process.env.RUNNER_TEMP, 'aco-pack', filename));")
          test -n "$TARBALL" || { echo "ERROR: ai-cli-orch-wrapper tarball not found"; exit 1; }
          npm install --prefix "$RUNNER_TEMP/aco-prefix" "$TARBALL"
          echo "$RUNNER_TEMP/aco-prefix/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Smoke test aco binary
        run: |
          aco --version
          aco run --help

  fixtures:
    name: fixtures
    runs-on: ubuntu-latest
    needs: [go-build, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm ci
      - name: Build Go binary
        run: go build -o aco ./cmd/aco
      - name: Run fixture suite
        run: npm run test:fixtures -- --binary ./aco
