<svg viewBox="0 0 780 470" xmlns="http://www.w3.org/2000/svg" font-family="&#39;Helvetica Neue&#39;,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg-sl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fdf4ff"></stop><stop offset="50%" stop-color="#eef2ff"></stop><stop offset="100%" stop-color="#f0fdfa"></stop></linearGradient>
    <linearGradient id="usr-sl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f472b6"></stop><stop offset="100%" stop-color="#db2777"></stop></linearGradient>
    <linearGradient id="skl-sl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#818cf8"></stop><stop offset="100%" stop-color="#4f46e5"></stop></linearGradient>
    <linearGradient id="cli-sl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#60a5fa"></stop><stop offset="100%" stop-color="#2563eb"></stop></linearGradient>
    <linearGradient id="prv-sl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34d399"></stop><stop offset="100%" stop-color="#059669"></stop></linearGradient>
    <linearGradient id="art-sl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2dd4bf"></stop><stop offset="100%" stop-color="#0d9488"></stop></linearGradient>
    <filter id="sh-sl" x="-10%" y="-10%" width="120%" height="130%"><feGaussianBlur in="SourceAlpha" stdDeviation="2.5"></feGaussianBlur><feOffset dx="0" dy="2" result="ob"></feOffset><feFlood flood-color="#1e1b4b" flood-opacity="0.12"></feFlood><feComposite in2="ob" operator="in"></feComposite><feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
    <marker id="arr-b-sl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"></path></marker>
    <marker id="arr-v-sl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"></path></marker>
    <marker id="arr-g-sl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"></path></marker>
    <marker id="arr-t-sl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0d9488"></path></marker>
  </defs>
  <rect width="780" height="470" rx="16" fill="url(#bg-sl)"></rect>
  <circle cx="20" cy="20" r="2.5" fill="#ec4899" opacity="0.4"></circle><circle cx="760" cy="20" r="2.5" fill="#0d9488" opacity="0.4"></circle>
  <text x="390" y="26" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="700" fill="#1e293b" letter-spacing="0.3">Delegation Lifecycle — /aco &#183; $aco skill, internal aco ask</text>
  <line x1="300" y1="44" x2="350" y2="44" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"></line>
  <line x1="430" y1="44" x2="480" y2="44" stroke="#0d9488" stroke-width="2" stroke-linecap="round"></line>
  <circle cx="390" cy="44" r="3" fill="#3b82f6"></circle>

  <!-- columns: User · Skill(/aco·$aco) · aco(internal) · Provider · Artifacts -->
  <g filter="url(#sh-sl)"><rect x="25" y="60" width="90" height="42" rx="8" fill="url(#usr-sl)"></rect></g>
  <text x="70" y="81" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="white">User</text>

  <g filter="url(#sh-sl)"><rect x="150" y="60" width="130" height="42" rx="8" fill="url(#skl-sl)"></rect></g>
  <text x="215" y="76" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="white">/aco &#183; $aco</text>
  <text x="215" y="91" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="500" fill="#e0e7ff">Claude Code / Codex skill</text>

  <g filter="url(#sh-sl)"><rect x="315" y="60" width="130" height="42" rx="8" fill="url(#cli-sl)"></rect></g>
  <text x="380" y="76" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="white">aco CLI</text>
  <text x="380" y="91" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="500" fill="#dbeafe">internal plumbing</text>

  <g filter="url(#sh-sl)"><rect x="490" y="60" width="110" height="42" rx="8" fill="url(#prv-sl)"></rect></g>
  <text x="545" y="81" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="white">Provider</text>

  <g filter="url(#sh-sl)"><rect x="635" y="60" width="110" height="42" rx="8" fill="url(#art-sl)"></rect></g>
  <text x="690" y="81" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="white">Artifacts</text>

  <!-- lifelines -->
  <line x1="70" y1="107" x2="70" y2="430" stroke="#ec4899" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"></line>
  <line x1="215" y1="107" x2="215" y2="430" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"></line>
  <line x1="380" y1="107" x2="380" y2="430" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"></line>
  <line x1="545" y1="107" x2="545" y2="430" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"></line>
  <line x1="690" y1="107" x2="690" y2="430" stroke="#0d9488" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"></line>

  <!-- 1. User -> Skill : user types /aco -->
  <circle cx="70" cy="130" r="9" fill="#ec4899"></circle>
  <text x="70" y="130" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">1</text>
  <rect x="78" y="119" width="129" height="18" rx="9" fill="white" stroke="#818cf8" stroke-width="1"></rect>
  <text x="142" y="128" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">/aco "&lt;task in natural language&gt;"</text>
  <line x1="80" y1="148" x2="209" y2="148" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-v-sl)"></line>

  <!-- 2. Skill to aco CLI : skill runs dry-run internally -->
  <circle cx="215" cy="170" r="9" fill="#4f46e5"></circle>
  <text x="215" y="170" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">2</text>
  <rect x="232" y="159" width="131" height="18" rx="9" fill="white" stroke="#60a5fa" stroke-width="1"></rect>
  <text x="297" y="168" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">aco ask --dry-run (internal)</text>
  <line x1="225" y1="188" x2="374" y2="188" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b-sl)"></line>

  <!-- 3. aco CLI -> User (dashed back) : plan shown, no execution -->
  <circle cx="380" cy="210" r="9" fill="#3b82f6"></circle>
  <text x="380" y="210" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">3</text>
  <rect x="150" y="199" width="160" height="18" rx="9" fill="white" stroke="#60a5fa" stroke-width="1"></rect>
  <text x="230" y="208" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">show plan &#183; no execution yet</text>
  <line x1="372" y1="228" x2="76" y2="228" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-b-sl)"></line>

  <!-- 4. User -> Skill : approve -->
  <circle cx="70" cy="250" r="9" fill="#ec4899"></circle>
  <text x="70" y="250" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">4</text>
  <rect x="92" y="239" width="130" height="18" rx="9" fill="white" stroke="#818cf8" stroke-width="1"></rect>
  <text x="157" y="248" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">approve &#8594; aco ask --yes</text>
  <line x1="80" y1="268" x2="209" y2="268" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-v-sl)"></line>

  <!-- 5. aco CLI -> Provider : invoke advisory provider -->
  <circle cx="380" cy="290" r="9" fill="#3b82f6"></circle>
  <text x="380" y="290" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">5</text>
  <rect x="385" y="279" width="155" height="18" rx="9" fill="white" stroke="#34d399" stroke-width="1"></rect>
  <text x="462" y="288" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">invoke advisory provider</text>
  <line x1="390" y1="308" x2="539" y2="308" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g-sl)"></line>

  <!-- 6. Provider -> Artifacts : write ledger + brief + logs -->
  <circle cx="545" cy="330" r="9" fill="#10b981"></circle>
  <text x="545" y="330" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">6</text>
  <rect x="540" y="319" width="160" height="18" rx="9" fill="white" stroke="#2dd4bf" stroke-width="1"></rect>
  <text x="620" y="328" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">write ledger + brief + logs</text>
  <line x1="555" y1="348" x2="684" y2="348" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-t-sl)"></line>

  <!-- 7. Skill -> User (dashed back) : return summary -->
  <circle cx="215" cy="385" r="9" fill="#4f46e5"></circle>
  <text x="215" y="385" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white">7</text>
  <rect x="80" y="374" width="150" height="18" rx="9" fill="white" stroke="#818cf8" stroke-width="1"></rect>
  <text x="155" y="383" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="500" fill="#1e293b">return summary / paths</text>
  <line x1="207" y1="403" x2="76" y2="403" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-v-sl)"></line>

  <!-- legend -->
  <line x1="40" y1="448" x2="80" y2="448" stroke="#3b82f6" stroke-width="1.5"></line>
  <text x="88" y="448" dominant-baseline="middle" font-size="10" fill="#475569">solid: request</text>
  <line x1="200" y1="448" x2="240" y2="448" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3"></line>
  <text x="248" y="448" dominant-baseline="middle" font-size="10" fill="#475569">dashed: response</text>
  <text x="560" y="448" dominant-baseline="middle" font-size="10" fill="#475569">user uses the skill; aco runs inside</text>
</svg>
