<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="50%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>

    <!-- Stage gradients -->
    <linearGradient id="event-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="go-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="contract-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="test-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="final-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="2" result="offset-blur"/>
      <feFlood flood-color="#1e1b4b" flood-opacity="0.18"/>
      <feComposite in2="offset-blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="380" rx="16" fill="url(#bg-grad)"/>

  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="2.5" fill="#fb7185" opacity="0.4"/>
  <circle cx="800" cy="20" r="2.5" fill="#fbbf24" opacity="0.4"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" dominant-baseline="middle"
        font-size="15" font-weight="700" fill="#1e293b" letter-spacing="0.3">CI Pipeline — .github/workflows/ci.yml</text>
  <line x1="280" y1="46" x2="330" y2="46" stroke="#fb7185" stroke-width="2" stroke-linecap="round"/>
  <line x1="490" y1="46" x2="540" y2="46" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <circle cx="410" cy="46" r="3" fill="#3b82f6"/>

  <!-- ─── STAGE 1: Trigger ─── -->
  <g filter="url(#shadow)">
    <rect x="30" y="155" width="140" height="68" rx="10" fill="white" stroke="#fb7185" stroke-width="1.5"/>
    <rect x="30" y="155" width="140" height="28" rx="10" fill="url(#event-grad)"/>
    <rect x="30" y="169" width="140" height="14" fill="url(#event-grad)"/>
  </g>
  <text x="100" y="169" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="white">⚡  Trigger</text>
  <text x="100" y="197" text-anchor="middle" dominant-baseline="middle"
        font-size="10" fill="#1e293b" font-weight="500">push / PR</text>
  <text x="100" y="212" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" fill="#64748b">→ main</text>

  <!-- Arrows from event to stage 2 jobs -->
  <line x1="170" y1="170" x2="200" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="180" x2="200" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="190" x2="200" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="205" x2="200" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── STAGE 2: Parallel jobs ─── -->
  <!-- lint -->
  <g filter="url(#shadow)">
    <rect x="205" y="80" width="130" height="48" rx="8" fill="white" stroke="#34d399" stroke-width="1.5"/>
    <rect x="205" y="80" width="130" height="22" rx="8" fill="url(#node-grad)"/>
    <rect x="205" y="91" width="130" height="11" fill="url(#node-grad)"/>
  </g>
  <text x="270" y="91" text-anchor="middle" dominant-baseline="middle"
        font-size="10" font-weight="700" fill="white">🟢  lint</text>
  <text x="270" y="116" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="#475569">format:check</text>

  <!-- typecheck -->
  <g filter="url(#shadow)">
    <rect x="205" y="142" width="130" height="48" rx="8" fill="white" stroke="#34d399" stroke-width="1.5"/>
    <rect x="205" y="142" width="130" height="22" rx="8" fill="url(#node-grad)"/>
    <rect x="205" y="153" width="130" height="11" fill="url(#node-grad)"/>
  </g>
  <text x="270" y="153" text-anchor="middle" dominant-baseline="middle"
        font-size="10" font-weight="700" fill="white">🟢  typecheck</text>
  <text x="270" y="178" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="#475569">build + tsc</text>

  <!-- contract -->
  <g filter="url(#shadow)">
    <rect x="205" y="204" width="130" height="48" rx="8" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="205" y="204" width="130" height="22" rx="8" fill="url(#contract-grad)"/>
    <rect x="205" y="215" width="130" height="11" fill="url(#contract-grad)"/>
  </g>
  <text x="270" y="215" text-anchor="middle" dominant-baseline="middle"
        font-size="10" font-weight="700" fill="white">🟣  contract</text>
  <text x="270" y="240" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="#475569">verify-contract.ts</text>

  <!-- go-build -->
  <g filter="url(#shadow)">
    <rect x="205" y="266" width="130" height="48" rx="8" fill="white" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="205" y="266" width="130" height="22" rx="8" fill="url(#go-grad)"/>
    <rect x="205" y="277" width="130" height="11" fill="url(#go-grad)"/>
  </g>
  <text x="270" y="277" text-anchor="middle" dominant-baseline="middle"
        font-size="10" font-weight="700" fill="white">🐹  go-build</text>
  <text x="270" y="302" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="#475569">go build ./cmd/aco</text>

  <!-- Arrows: stage 2 → stage 3 -->
  <!-- lint → test -->
  <line x1="335" y1="104" x2="375" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- typecheck → test -->
  <line x1="335" y1="166" x2="375" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- go-build → go-test -->
  <line x1="335" y1="290" x2="375" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── STAGE 3: Test jobs ─── -->
  <!-- test -->
  <g filter="url(#shadow)">
    <rect x="380" y="125" width="140" height="52" rx="8" fill="white" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="380" y="125" width="140" height="24" rx="8" fill="url(#test-grad)"/>
    <rect x="380" y="137" width="140" height="12" fill="url(#test-grad)"/>
  </g>
  <text x="450" y="137" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="white">🔵  test</text>
  <text x="450" y="164" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" fill="#475569">npm test</text>

  <!-- go-test -->
  <g filter="url(#shadow)">
    <rect x="380" y="245" width="140" height="52" rx="8" fill="white" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="380" y="245" width="140" height="24" rx="8" fill="url(#go-grad)"/>
    <rect x="380" y="257" width="140" height="12" fill="url(#go-grad)"/>
  </g>
  <text x="450" y="257" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="white">🐹  go-test</text>
  <text x="450" y="284" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" fill="#475569">go test ./...</text>

  <!-- Arrows: stage 3 → stage 4 -->
  <line x1="520" y1="151" x2="560" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="151" x2="560" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="271" x2="560" y2="225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── STAGE 4: Final gates ─── -->
  <!-- smoke -->
  <g filter="url(#shadow)">
    <rect x="565" y="135" width="160" height="58" rx="8" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="565" y="135" width="160" height="26" rx="8" fill="url(#final-grad)"/>
    <rect x="565" y="148" width="160" height="13" fill="url(#final-grad)"/>
  </g>
  <text x="645" y="148" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="white">💨  smoke</text>
  <text x="645" y="172" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" fill="#1e293b" font-weight="500">npm pack + ask mock</text>
  <text x="645" y="186" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="#64748b">dry-run / brief / result</text>

  <!-- fixtures -->
  <g filter="url(#shadow)">
    <rect x="565" y="200" width="160" height="58" rx="8" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="565" y="200" width="160" height="26" rx="8" fill="url(#final-grad)"/>
    <rect x="565" y="213" width="160" height="13" fill="url(#final-grad)"/>
  </g>
  <text x="645" y="213" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="white">🧪  fixtures</text>
  <text x="645" y="237" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" fill="#1e293b" font-weight="500">cross-runtime suite</text>
  <text x="645" y="251" text-anchor="middle" dominant-baseline="middle"
        font-size="9" fill="#64748b">test:fixtures --binary</text>

  <!-- Final result -->
  <g filter="url(#shadow)">
    <rect x="755" y="140" width="50" height="115" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="755" y="140" width="50" height="26" rx="8" fill="#10b981"/>
    <rect x="755" y="153" width="50" height="13" fill="#10b981"/>
  </g>
  <text x="780" y="153" text-anchor="middle" dominant-baseline="middle"
        font-size="14" font-weight="700" fill="white">✅</text>
  <text x="780" y="190" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" font-weight="700" fill="#1e293b">PASS</text>
  <text x="780" y="210" text-anchor="middle" dominant-baseline="middle"
        font-size="8" fill="#64748b">all gates</text>
  <text x="780" y="222" text-anchor="middle" dominant-baseline="middle"
        font-size="8" fill="#64748b">green</text>

  <!-- Arrows: final → result -->
  <line x1="725" y1="164" x2="753" y2="180" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="725" y1="229" x2="753" y2="215" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── STAGE LABELS at top ─── -->
  <text x="100" y="55" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">① TRIGGER</text>
  <text x="270" y="55" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">② PARALLEL JOBS</text>
  <text x="450" y="55" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">③ TESTS</text>
  <text x="645" y="55" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">④ FINAL GATES</text>
  <text x="780" y="55" text-anchor="middle" dominant-baseline="middle"
        font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">⑤ RESULT</text>

  <!-- ─── LEGEND ─── -->
  <line x1="30" y1="345" x2="780" y2="345" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="40" y="355" width="14" height="14" rx="3" fill="url(#node-grad)"/>
  <text x="60" y="362" dominant-baseline="middle" font-size="10" fill="#475569">Node.js gate</text>
  <rect x="160" y="355" width="14" height="14" rx="3" fill="url(#go-grad)"/>
  <text x="180" y="362" dominant-baseline="middle" font-size="10" fill="#475569">Go gate</text>
  <rect x="270" y="355" width="14" height="14" rx="3" fill="url(#contract-grad)"/>
  <text x="290" y="362" dominant-baseline="middle" font-size="10" fill="#475569">Contract gate</text>
  <rect x="395" y="355" width="14" height="14" rx="3" fill="url(#test-grad)"/>
  <text x="415" y="362" dominant-baseline="middle" font-size="10" fill="#475569">Cross-runtime test</text>
  <rect x="540" y="355" width="14" height="14" rx="3" fill="url(#final-grad)"/>
  <text x="560" y="362" dominant-baseline="middle" font-size="10" fill="#475569">Smoke / fixture / ask MVP</text>
  <rect x="670" y="355" width="14" height="14" rx="3" fill="#10b981"/>
  <text x="690" y="362" dominant-baseline="middle" font-size="10" fill="#475569">Final result</text>
</svg>
